<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中石大克校区资源共享论坛</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }
        
        .landing-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        /* 图片轮播 */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            will-change: opacity;
            transform: translateZ(0);
        }
        
        .slide.active {
            opacity: 1;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 2;
        }
        
        /* 内容区域 */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            padding: 60px 60px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            will-change: transform, opacity;
            transform: translateZ(0);
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            animation: fadeInDown 1s ease-out;
        }
        
        .logo-icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }
        
        .title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.95;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }
        
        .enter-btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: rgba(200, 16, 46, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .enter-btn:hover {
            transform: scale(1.05);
            background: #C8102E;
            box-shadow: 0 6px 30px rgba(200, 16, 46, 0.5);
        }
        
        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            animation: fadeIn 1s ease-out 1.2s both;
        }
        
        .footer-info a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
        }
        
        .footer-info a:hover {
            text-decoration: underline;
        }
        
        /* 指示器 */
        .indicators {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 12px;
            animation: fadeIn 1s ease-out 1.1s both;
        }
        
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .indicator.active {
            background-color: #fff;
            transform: scale(1.2);
        }
        
        .indicator:hover {
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .logo-icon {
                font-size: 60px;
            }
            .title {
                font-size: 28px;
            }
            .subtitle {
                font-size: 16px;
            }
            .enter-btn {
                padding: 15px 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 图片轮播 - 预加载优化 -->
    <link rel="preload" href="image/01.jpg" as="image">
    <div class="slideshow">
        <div class="slide active" style="background-image: url('image/01.jpg')" loading="eager"></div>
        <div class="slide" style="background-image: url('image/02.jpg')" loading="lazy"></div>
        <div class="slide" style="background-image: url('image/03.jpg')" loading="lazy"></div>
        <div class="slide" style="background-image: url('image/04.png')" loading="lazy"></div>
    </div>
    
    <!-- 遮罩层 -->
    <div class="overlay"></div>
    
    <!-- 内容 -->
    <div class="landing-container">
        <div class="content">
            <div class="logo-icon">📚</div>
            <h1 class="title">中石大克校区资源共享论坛</h1>
            <p class="subtitle">学生自发创建的学习资源共享平台</p>
            <a href="home.html" class="enter-btn">进入网站</a>
        </div>
        
        <!-- 指示器 -->
        <div class="indicators">
            <div class="indicator active" data-index="0"></div>
            <div class="indicator" data-index="1"></div>
            <div class="indicator" data-index="2"></div>
            <div class="indicator" data-index="3"></div>
        </div>
        
        <!-- 底部信息 -->
        <div class="footer-info">
            <p>非盈利性质 | 开源免费 | <a href="about.html">关于我们</a></p>
        </div>
    </div>
    
    <script>
        // 图片轮播
        var slides = document.querySelectorAll('.slide');
        var indicators = document.querySelectorAll('.indicator');
        var currentSlide = 0;
        var slideInterval;
        var intervalTime = 5000; // 每5秒切换
        
        function showSlide(index) {
            // 移除所有active
            slides.forEach(function(slide) {
                slide.classList.remove('active');
            });
            indicators.forEach(function(ind) {
                ind.classList.remove('active');
            });
            
            // 添加active到当前
            slides[index].classList.add('active');
            indicators[index].classList.add('active');
            
            currentSlide = index;
        }
        
        function nextSlide() {
            var next = (currentSlide + 1) % slides.length;
            showSlide(next);
        }
        
        function startSlideshow() {
            slideInterval = setInterval(nextSlide, intervalTime);
        }
        
        function stopSlideshow() {
            clearInterval(slideInterval);
        }
        
        // 点击指示器切换
        indicators.forEach(function(indicator, index) {
            indicator.addEventListener('click', function() {
                stopSlideshow();
                showSlide(index);
                startSlideshow();
            });
        });
        
        // 鼠标悬停时暂停
        document.querySelector('.slideshow').addEventListener('mouseenter', function() {
            stopSlideshow();
        });
        
        document.querySelector('.slideshow').addEventListener('mouseleave', function() {
            startSlideshow();
        });
        
        // 开始轮播
        startSlideshow();
    </script>
</body>
</html>
