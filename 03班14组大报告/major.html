    <style>
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .breadcrumb a {
            color: var(--link-color);
        }
        .breadcrumb span {
            margin: 0 8px;
        }
        .course-list {
            background-color: var(--bg-light);
            border-radius: 8px;
            padding: 20px;
        }
        .course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .course-item:last-child {
            border-bottom: none;
        }
        .course-info {
            flex: 1;
        }
        .course-name {
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }
        .course-meta {
            font-size: 13px;
            color: var(--text-muted);
        }
        .course-stats {
            text-align: right;
            min-width: 120px;
        }
        .course-stats div {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        .course-stats .downloads {
            color: var(--link-color);
            font-weight: bold;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .back-btn {
            display: inline-block;
            background-color: var(--bg-light);
            color: var(--link-color);
            padding: 10px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--link-color);
        }
        .back-btn:hover {
            background-color: var(--link-color);
            color: #fff;
            text-decoration: none;
        }
    </style>

        function getUrlParam(name) {
            var params = window.location.search.substring(1).split("&");
            for (var i = 0; i < params.length; i++) {
                var pair = params[i].split("=");
                if (pair[0] === name) {
                    return decodeURIComponent(pair[1] || "");
                }
            }
            return "";
        }

        function loadMajorData() {
            var majorName = getUrlParam("major");
            var collegeName = getUrlParam("college");
            
            if (!majorName) {
                document.getElementById("pageTitle").textContent = "专业课程";
                document.getElementById("majorDesc").textContent = "请从课程资源页面选择专业";
                return;
            }
            
            // 更新页面标题
            document.getElementById("pageTitle").textContent = majorName + " 专业课程";
            document.getElementById("majorName").textContent = majorName;
            document.getElementById("collegeName").textContent = collegeName || "本学院";
            
            // 获取课程数据
            var majorData = majorCourseData[majorName];
            
            // 渲染必修课程
            var requiredContainer = document.getElementById("requiredCourses");
            if (majorData && majorData.required.length > 0) {
                var html = "";
                majorData.required.forEach(function(course) {
                    // 搜索相关的资源
                    var relatedRes = searchRelatedResources(majorName, course.name);
                    html += '<div class="course-item">';
                    html += '<div class="course-info">';
                    html += '<div class="course-name">' + course.name + '</div>';
                    html += '<div class="course-meta">学分：' + course.credits + ' | 学期：' + course.semester + '</div>';
                    html += '</div>';
                    html += '<div class="course-stats">';
                    if (relatedRes) {
                        html += '<div>资料：' + relatedRes.count + '份</div>';
                        html += '<div class="downloads">下载：' + relatedRes.downloads + '次</div>';
                    } else {
                        html += '<div>暂无资料</div>';
                        html += '<div><a href="upload.html" style="color:var(--link-color);">上传资料</a></div>';
                    }
                    html += '</div>';
                    html += '</div>';
                });
                requiredContainer.innerHTML = html;
            } else {
                requiredContainer.innerHTML = '<div class="empty-state">暂无课程数据</div>';
            }
            
            // 渲染选修课程
            var electiveContainer = document.getElementById("electiveCourses");
            if (majorData && majorData.elective.length > 0) {
                var html = "";
                majorData.elective.forEach(function(course) {
                    var relatedRes = searchRelatedResources(majorName, course.name);
                    html += '<div class="course-item">';
                    html += '<div class="course-info">';
                    html += '<div class="course-name">' + course.name + '</div>';
                    html += '<div class="course-meta">学分：' + course.credits + ' | 学期：' + course.semester + ' | 选修</div>';
                    html += '</div>';
                    html += '<div class="course-stats">';
                    if (relatedRes) {
                        html += '<div>资料：' + relatedRes.count + '份</div>';
                        html += '<div class="downloads">下载：' + relatedRes.downloads + '次</div>';
                    } else {
                        html += '<div>暂无资料</div>';
                        html += '<div><a href="upload.html" style="color:var(--link-color);">上传资料</a></div>';
                    }
                    html += '</div>';
                    html += '</div>';
                });
                electiveContainer.innerHTML = html;
            } else {
                electiveContainer.innerHTML = '<div class="empty-state">暂无选修课程数据</div>';
            }
            
            // 渲染相关资源
            var relatedContainer = document.getElementById("relatedResources");
            var allResources = DataStore.getAllResources();
            var related = allResources.filter(function(r) {
                var searchText = (r.title + " " + r.description).toLowerCase();
                return searchText.indexOf(majorName.toLowerCase()) !== -1 || 
                       searchText.indexOf("大学") !== -1;
            }).slice(0, 4);
            
            if (related.length > 0) {
                var html = "";
                related.forEach(function(res) {
                    html += '<div class="resource-card">';
                    html += '<div class="resource-title"><a href="detail.html?id=' + res.id + '">' + res.title + '</a></div>';
                    html += '<div class="resource-meta">分类：' + (DataStore.categoryNames[res.category] || res.category) + '</div>';
                    html += '<div class="resource-meta">上传者：' + res.uploader + '</div>';
                    html += '<div class="resource-meta">下载：' + (res.downloads || 0) + '次</div>';
                    html += '</div>';
                });
                relatedContainer.innerHTML = html;
            } else {
                relatedContainer.innerHTML = '<div class="empty-state">暂无相关资源，<a href="upload.html">成为第一个上传者</a></div>';
            }
        }

        function searchRelatedResources(major, course) {
            var allResources = DataStore.getAllResources();
            var matched = allResources.filter(function(r) {
                var searchText = (r.title + " " + r.description).toLowerCase();
                return searchText.indexOf(major.toLowerCase()) !== -1 || 
                       searchText.indexOf(course.toLowerCase()) !== -1;
            });
            
            if (matched.length > 0) {
                var totalDownloads = 0;
                matched.forEach(function(r) {
                    totalDownloads += r.downloads || 0;
                });
                return { count: matched.length, downloads: totalDownloads };
            }
            return null;
        }

        // 初始化
        waitForDataStore(function() {
            loadMajorData();
        });
        
        window.onscroll = function() {
            var navbar = document.getElementById("navbar");
            if (navbar) {
                if (window.pageYOffset > 50) {
                    navbar.classList.add("scrolled");
                } else {
                    navbar.classList.remove("scrolled");
                }
            }
        };
    </script>
